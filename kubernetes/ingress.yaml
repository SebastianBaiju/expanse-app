apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: expense-manager-ingress
  namespace: exp-management
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Optional: Increase body size limit for file uploads (e.g. PDF/Receipt scanning)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: expense-manager.local  # Replace with your actual domain or leave empty for wildcard
      http:
        paths:
          # Route all traffic to the separate Nginx proxy server
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-proxy
                port:
                  number: 80
