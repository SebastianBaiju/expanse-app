apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: expense-manager-ingress
  namespace: exp-management
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Optional: Increase body size limit for file uploads (e.g. PDF/Receipt scanning)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: expense-manager.local  # Replace with your actual domain or leave empty for wildcard
      http:
        paths:
          # Approach A: Let the frontend Nginx handle the API proxying internally (Recommended)
          # With this approach, you only need to point the root path to the frontend.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # Approach B: Direct Ingress-level routing (Alternative)
          # If you want the Ingress Controller to route traffic directly without passing through frontend Nginx for API:
          # - path: /api
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: backend
          #       port:
          #         number: 8080
